apiVersion: v1
kind: Service
metadata:
  name: {{ include "cmdb-core.fullname" . }}
  labels:
    {{- include "cmdb-core.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "cmdb-core.labels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
