apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cmdb-core.fullname" . }}
  labels:
    {{- include "cmdb-core.labels" . | nindent 4 }}
data:
  DJANGO_DEBUG: {{ .Values.django.debug | quote }}
  DJANGO_ALLOWED_HOSTS: {{ .Values.django.allowedHosts | quote }}
  DB_ENGINE: {{ .Values.database.engine | quote }}
  POSTGRES_DB: {{ .Values.database.name | quote }}
  POSTGRES_USER: {{ .Values.database.user | quote }}
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
